<!DOCTYPE html>
<html>

<head>
<title>Planificateur de menus</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:40px;
    display:flex;
    justify-content:center;
}
.app{
    width:800px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-top:0;}
.controls{text-align:center;margin-bottom:20px;}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}
button:hover{background:#2563eb;}
.reset{background:#ef4444;}
.reset:hover{background:#dc2626;}
.semaine{
    margin-top:20px;
    background:#f9fafc;
    padding:15px;
    border-radius:10px;
}
.semaine h3{margin-top:0;}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}
.jour{
    background:white;
    padding:10px;
    border-radius:6px;
    display:grid;
    grid-template-columns: 120px 1fr 1fr;
    align-items:center;
    border:1px solid #eee;
    gap:10px;
}
.nomjour{
    font-weight:bold;
    color:#555;
    min-width:90px;
    display:flex;
    align-items:center;
}
.parametres-bloc {
    background: #f0f4ff;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 15px;
}
.parametres-titre {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 16px;
    color: #374151;
}
.parametres-grid {
    display: grid;
    grid-template-columns: auto repeat(7, 1fr);
    gap: 6px 10px;
    align-items: center;
}
.param-jour {
    font-weight: bold;
    font-size: 13px;
    color: #4b5563;
    text-align: center;
}
.param-row-label {
    font-size: 14px;
    color: #6b7280;
    white-space: nowrap;
    padding-right: 4px;
}

    display: flex;
    justify-content: center;
    cursor: pointer;
}
.param-check input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #3b82f6;
}
.firebase-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    color: #6b7280;
}
.firebase-status.ok { background:#f0fdf4; border-color:#bbf7d0; color:#15803d; }
.firebase-status.erreur { background:#fef2f2; border-color:#fecaca; color:#dc2626; }
.firebase-status.chargement { background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
.firebase-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
}
.firebase-status .badge {
    margin-left: auto;
    border-radius: 999px;
    padding: 2px 10px;
    font-weight: bold;
    white-space: nowrap;
}
.firebase-status.ok .badge { background:#dcfce7; color:#15803d; }
.firebase-status.erreur .badge { background:#fee2e2; color:#dc2626; }
.firebase-status.chargement .badge { background:#dbeafe; color:#1d4ed8; }
.repas-box .regen-btn {
    background: transparent;
    color: #9ca3af;
    border: none;

}

    color: #3b82f6;
    background: #dbeafe;
}
.repas-box{
    background:#f9fafc;
    border-radius:6px;
    padding:8px;
    display:flex;
    flex-direction:column;
    border-left:3px solid #e5e7eb;
}
.repas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
}
.repas-titre{ font-size:12px; color:#6b7280; }
.repas-contenu{ font-size:14px; font-weight:500; }

}
.repas-box.impossible .repas-contenu {
    color: #c2410c;
    font-style: italic;
    font-size: 13px;
}
/* Box affichée quand une case midi est cochée après coup mais qu'aucun repas
   n'avait été stocké pour ce jour (génération initiale faite sans ce jour coché).
   Ton neutre pour indiquer une action à effectuer (🔄), sans signaler d'erreur. */

    border-left-color: #d1d5db;
    background: #f3f4f6;
}
.repas-box.non-stocke .repas-contenu {
    color: #9ca3af;
    font-style: italic;
    font-size: 13px;
}
</style>

<body>
<div class="app">
<h1>Planificateur de menus</h1>

<div class="parametres-bloc">
    <div class="parametres-titre">⚙️ Paramètres</div>
    <div class="parametres-grid">
        <div></div>
        <div class="param-jour">Lundi</div>
        <div class="param-jour">Mardi</div>
        <div class="param-jour">Mercredi</div>
        <div class="param-jour">Jeudi</div>
        <div class="param-jour">Vendredi</div>
        <div class="param-jour">Samedi</div>
        <div class="param-jour">Dimanche</div>
        <div class="param-row-label">☀️ Midi</div>
        <label class="param-check"><input type="checkbox" id="midi_lundi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mardi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mercredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_jeudi"></label>
        <label class="param-check"><input type="checkbox" id="midi_vendredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_samedi" checked></label>
        <label class="param-check"><input type="checkbox" id="midi_dimanche" checked></label>
    </div>
</div>

<div id="firebaseStatus" class="firebase-status chargement">
    <span class="dot"></span>
    <span id="firebaseStatusText">Connexion à Firebase…</span>
    <span class="badge" id="firebaseBadge">chargement</span>
</div>

<div class="controls">
    <button onclick="genererMenu()">Générer une semaine</button>
    <button onclick="generer2Semaines()">Générer 2 semaines</button>
    <button class="reset" onclick="resetHistorique()">Réinitialiser l'historique</button>
</div>

<div id="menu"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ─── Configuration Firebase ───────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyA7-OjvE2UEfy0DtxGuEP9kJ9iM4OslUvI",
    authDomain: "menus-ce381.firebaseapp.com",
    projectId: "menus-ce381",
    storageBucket: "menus-ce381.firebasestorage.app",
    messagingSenderId: "828215763434",
    appId: "1:828215763434:web:d9686690f65b59c8871293"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const DOC_HISTORIQUE = doc(db, "historique", "precedent");
const DOC_MENU       = doc(db, "historique", "dernier_menu");

const jours = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

// Tableau des repas chargés depuis le CSV.
// Chaque entrée contient : { name, legumes, feculent, viande, categorie }
let repas = [];

let historique  = [];
let dernierMenu = null;
// Capture du menu stocké AVANT la génération en cours.
// Utilisé par regenererRepas() pour appliquer la Règle 4 :
// après une génération, dernierMenu est écrasé par le menu courant,
// donc on ne peut plus l'utiliser pour retrouver les semaines précédentes.
let menuAvantGeneration = null;

// ─── Utilitaires Firebase ─────────────────────────────────────────────────

function setStatut(etat, texte, badge){
    const el = document.getElementById("firebaseStatus");
    el.className = "firebase-status " + etat;
    document.getElementById("firebaseStatusText").textContent = texte;
    document.getElementById("firebaseBadge").textContent = badge;
}

async function chargerDepuisFirebase(){
    try {
        const snapHisto = await getDoc(DOC_HISTORIQUE);
        historique = snapHisto.exists() ? (snapHisto.data().repas || []) : [];

        const snapMenu = await getDoc(DOC_MENU);
        dernierMenu = snapMenu.exists() ? (snapMenu.data().menus || null) : null;

        setStatut("ok", "Firebase connecté — historique synchronisé sur tous vos appareils", historique.length + " repas exclus");
        if(dernierMenu) afficher(dernierMenu);
    } catch(e){
        setStatut("erreur", "Erreur Firebase : " + e.message, "hors ligne");
    }
}

async function sauvegarderDansFirebase(repasGeneres, menus){
    historique = repasGeneres;
    try {
        await setDoc(DOC_HISTORIQUE, { repas: historique });
        await setDoc(DOC_MENU, { menus: menus });
        setStatut("ok", "Historique sauvegardé ✓ — synchronisé sur tous vos appareils", historique.length + " repas exclus");
    } catch(e){
        setStatut("erreur", "Sauvegarde échouée : " + e.message, "erreur");
    }
}

window.resetHistorique = async function(){
    historique  = [];
    dernierMenu = null;
    try {
        await setDoc(DOC_HISTORIQUE, { repas: [] });
        await setDoc(DOC_MENU, { menus: null });
        setStatut("ok", "Historique réinitialisé ✓", "0 repas exclus");
    } catch(e){
        setStatut("erreur", "Erreur lors de la réinitialisation", "erreur");
    }
    document.getElementById("menu").innerHTML = "";
}

// ─── Chargement du CSV ────────────────────────────────────────────────────

async function chargerRepas(){
    const response = await fetch("repas.csv");
    const texte    = await response.text();
    const lignes   = texte.split("\n").map(r => r.trim()).filter(r => r !== "");
    // Colonnes parsées (nouveau format CSV — "Repas de fête" supprimé, "Poisson" ajouté) :
    //   cols[0] = Nom complet  → nom affiché
    //   cols[1] = Légumes      → non utilisé par les règles (conservé pour info)
    //   cols[2] = Féculent     → utilisé par la Règle 3 (pas de doublon de féculent)
    //   cols[3] = Viande       → utilisé par la Règle 1 (pas de viande/poisson le soir)
    //                            et par la Règle 3 (pas de doublon de viande)
    //   cols[4] = Poisson      → utilisé par la Règle 1 (pas de poisson le soir, sauf Tarte)
    //                            et par la Règle 3 (pas de doublon de poisson)
    //   cols[5] = Pâtes        → utilisé par la Règle 5 (pâtes forcées le dimanche soir)
    //                            Booléen : "Oui" → true, vide → false
    //   cols[6] = Purée        → indicateur booléen (non utilisé par les règles actuelles)
    //   cols[7] = Catégorie    → utilisé par les Règles 1 et 2 (exception/quota Tarte)
    //   cols[8] = Saison       → non utilisé par les règles actuelles
    //   cols[9] = Repas facile → non utilisé par les règles actuelles
    repas = lignes.slice(1).map(r => {
        const cols = r.split(";");
        return {
            name:      (cols[0] || "").replace(/^"/, "").replace(/"$/, "").trim(),
            legumes:   (cols[1] || "").trim(),
            feculent:  (cols[2] || "").trim(),
            viande:    (cols[3] || "").trim(),
            poisson:   (cols[4] || "").trim(),
            pates:     (cols[5] || "").trim().toLowerCase() === "oui",
            categorie: (cols[7] || "").trim()
        };
    }).filter(r => r.name !== "");
}

// ─── Utilitaires généraux ─────────────────────────────────────────────────

function shuffle(a){ return a.sort(() => Math.random() - 0.5); }
function midiActive(jour){ return document.getElementById("midi_" + jour).checked; }

// Découpe la chaîne de légumes du CSV (séparés par des virgules) en un tableau
// de chaînes normalisées (trim + lowercase). Retourne [] si la chaîne est vide.
// Exemples :
//   "Carotte"                      → ["carotte"]
//   "Tomate, Courgette, Aubergine" → ["tomate", "courgette", "aubergine"]
//   "Haricot vert,tomates"         → ["haricot vert", "tomates"]
function parseLegumes(str){
    if(!str || str.trim() === "") return [];
    return str.split(",").map(l => l.trim().toLowerCase()).filter(l => l !== "");
}

// ─────────────────────────────────────────────────────────────────────────
// RÈGLE 4 – Utilitaires : empreinte de repas et extraction des signatures
//           des semaines précédentes
//
// Deux repas sont considérés comme "identiques" si leurs 5 colonnes clés
// (Légumes, Féculent, Viande, Poisson, Catégorie) sont identiques.
// Le nom affiché n'entre PAS en compte : ainsi "Riz + Poulet" et
// "Commande Thaï" (même profil) seront tous deux bloqués si l'un d'eux
// a été servi la semaine précédente.
// ─────────────────────────────────────────────────────────────────────────

// Calcule une empreinte unique pour un repas à partir des 5 colonnes pertinentes.
// Les valeurs sont normalisées (trim + lowercase) pour éviter les faux négatifs
// dus aux espaces ou à la casse.
function signature(r){
    return [
        (r.legumes   || "").trim().toLowerCase(),
        (r.feculent  || "").trim().toLowerCase(),
        (r.viande    || "").trim().toLowerCase(),
        (r.poisson   || "").trim().toLowerCase(),
        (r.categorie || "").trim().toLowerCase()
    ].join("|");
}

// Construit un Set des signatures des repas présents dans les `n` dernières
// semaines du menu stocké (dernierMenu). Utilisé par construireSemaine() pour
// appliquer la Règle 4.
//
// Paramètres :
//   menusPrecedents : tableau de semaines issu de dernierMenu (peut être null)
//   n               : nombre de semaines à remonter (1 pour genererMenu,
//                     2 pour generer2Semaines)
//
// Retourne un Set vide si menusPrecedents est null ou vide (première génération).
function extraireSignaturesPrecedentes(menusPrecedents, n){
    if(!menusPrecedents || menusPrecedents.length === 0) return new Set();
    // slice(-n) prend les `n` dernières semaines ; si le menu en contient moins,
    // il prend toutes celles disponibles (comportement natif de slice).
    const dernieres = menusPrecedents.slice(-n);
    const sigs = new Set();
    dernieres.forEach(s => {
        (s.repas || []).forEach(jour => {
            ["midi", "soir"].forEach(m => {
                const r = jour[m];
                // On ignore les emplacements vides ("Aucun repas possible")
                if(r && r.name) sigs.add(signature(r));
            });
        });
    });
    return sigs;
}

// ─────────────────────────────────────────────────────────────────────────
// RÈGLE 1 : Pas de viande NI de poisson le soir (sauf catégorie Tarte)
//
// Un repas contenant une viande (colonne "Viande") ou un poisson (colonne
// "Poisson") ne peut être placé que le midi.
// Exception : si la catégorie est "Tarte", le repas est autorisé le soir
// quelle que soit la présence de viande ou de poisson (ex. : Tarte au thon,
// Pizza jambon, Flammkueche aux lardons).
// ─────────────────────────────────────────────────────────────────────────
function autoriseLeSOir(r){
    const aViande  = r.viande  && r.viande  !== "";
    const aPoisson = r.poisson && r.poisson !== "";
    const estTarte = r.categorie.toLowerCase() === "tarte";
    // Interdit le soir si viande ou poisson, sauf si c'est une Tarte
    return (!aViande && !aPoisson) || estTarte;
}

// ─────────────────────────────────────────────────────────────────────────
// RÈGLE 3 : Pas de doublon de viande, poisson ni féculent dans la même semaine.
//
// Un repas contient potentiellement une viande (colonne "Viande"), un poisson
// (colonne "Poisson") et/ou un féculent (colonne "Féculent"). Pour éviter la
// monotonie, on s'assure qu'aucune de ces valeurs n'apparaît deux fois dans
// la même semaine générée.
//
// Fonctionnement :
//   - viandesUtilises  : Set des viandes déjà présentes dans la semaine
//   - poissonsUtilises : Set des poissons déjà présents dans la semaine
//   - feculentsUtilises : Set des féculents déjà présents dans la semaine
//
// Un repas est refusé si :
//   - Sa viande (non vide) est déjà dans viandesUtilises
//   - OU son poisson (non vide) est déjà dans poissonsUtilises
//   - OU son féculent (non vide) est déjà dans feculentsUtilises
//
// Les valeurs vides ("") sont ignorées (pas de contrainte).
//
// Cette règle s'applique :
//   1. Dans construireSemaine() lors de la génération initiale
//   2. Dans regenererRepas() lors du rechargement manuel d'un repas
// ─────────────────────────────────────────────────────────────────────────
function autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises){
    // Si le repas a une viande déjà utilisée cette semaine → refusé
    if(r.viande   && r.viande   !== "" && viandesUtilises.has(r.viande))   return false;
    // Si le repas a un poisson déjà utilisé cette semaine → refusé
    if(r.poisson  && r.poisson  !== "" && poissonsUtilises.has(r.poisson)) return false;
    // Si le repas a un féculent déjà utilisé cette semaine → refusé
    if(r.feculent && r.feculent !== "" && feculentsUtilises.has(r.feculent)) return false;
    return true;
}

// Pioche `nb` repas aléatoires hors de la liste `exclu`,
// avec un filtre optionnel (ex. : autoriseLeSOir).
// Si pas assez de repas disponibles après exclusion, on relâche l'historique.
function piocherAvecFiltre(exclu, nb, filtre){
    let liste = shuffle([...repas])
        .filter(r => !exclu.includes(r.name))
        .filter(filtre || (() => true));
    if(liste.length < nb){
        liste = shuffle([...repas]).filter(filtre || (() => true));
    }
    return liste.slice(0, nb);
}

// ─────────────────────────────────────────────────────────────────────────
// Construction d'une semaine de menus en appliquant les cinq règles :
//
// RÈGLE 1 – Pas de viande ni de poisson le soir (sauf Tarte)
// RÈGLE 2 – Exactement 1 Tarte par semaine
//   (le dimanche soir est exclu des candidats du fallback Règle 2b, car réservé
//    par la Règle 5)
// RÈGLE 3 – Pas de doublon de viande, poisson ni féculent dans la semaine
//   Les sets viandesUtilises, poissonsUtilises et feculentsUtilises sont mis à jour après
//   chaque repas attribué. Lors de la pioche, la fonction autoriseParRegle3
//   filtre les candidats en temps réel. Si le pool est épuisé, l'emplacement
//   affichera "Aucun repas possible" sans contournement silencieux.
// RÈGLE 4 – Pas de repas dont l'empreinte (Légumes+Féculent+Viande+Poisson+Catégorie)
//   correspond à un repas des semaines précédentes stockées.
//   Les signatures à exclure sont passées en paramètre par les fonctions de
//   génération (genererMenu → 1 semaine, generer2Semaines → 2 semaines).
//   Si le Set est vide (première génération), la règle ne bloque rien.
// RÈGLE 6 – Au moins 3 jours d'écart entre deux repas partageant le même légume.
//   Un légume ne peut réapparaître qu'à partir du jour indexJour + 3 (inclus).
//   Midi et soir du même jour sont autorisés à partager le même légume (écart = 0).
//   Le Map dernierUsageLegume { légume → dernier indexJour } est mis à jour après
//   attribution des deux repas de chaque journée.
//   La Règle 3 est allégée pour le féculent : le plat du dimanche soir peut
//   dupliquer un féculent déjà utilisé en semaine, SAUF ceux du lundi
//   (midi + soir) et du samedi (midi + soir). La viande et le poisson restent
//   soumis à la Règle 3 complète. La Règle 1 s'applique normalement (pas de
//   viande ni de poisson le soir).
// ─────────────────────────────────────────────────────────────────────────
function construireSemaine(exclu, signaturesExclues = new Set()){
    const tousDispo  = shuffle([...repas]).filter(r => !exclu.includes(r.name));
    const soirDispo  = tousDispo.filter(r => autoriseLeSOir(r));
    const tarteDispo = tousDispo.filter(r => r.categorie.toLowerCase() === "tarte");

    // -- Règle 5 : pool des plats de pâtes pour le dimanche soir --
    // Filtre : Pâtes=Oui + autorisé le soir (Règle 1 : pas de viande ni poisson)
    // Ce pool est mélangé indépendamment pour éviter les biais de tri.
    const patesSoirDispo = shuffle([...repas]).filter(r =>
        !exclu.includes(r.name) && r.pates && autoriseLeSOir(r)
    );

    let idxTous = 0;
    let idxSoir = 0;

    const utilises = [];
    let tarteUtilisee = false;

    // -- Règle 3 : suivi des viandes, poissons et féculents déjà utilisés cette semaine --
    const viandesUtilises   = new Set();
    const poissonsUtilises  = new Set();
    const feculentsUtilises = new Set();

    // -- Règle 5 : féculents du lundi (index 0) et du samedi (index 5) uniquement --
    // Alimenté au fil du traitement de chaque jour ; disponible quand on atteint
    // le dimanche (index 6), puisque le tableau est parcouru dans l'ordre.
    const feculentsSamediLundi = new Set();

    // -- Règle 6 : suivi du dernier jour d'utilisation de chaque légume --
    // Clé : nom du légume (normalisé lowercase), Valeur : dernier indexJour où il apparaît.
    const dernierUsageLegume = new Map();
    // Index du jour en cours de traitement — mis à jour avant chaque appel à piocher()
    // et piocherPates() pour que ces fonctions puissent vérifier la Règle 6.
    let currentDayIndex = 0;

    // Retourne true si aucun légume du repas r ne viole la Règle 6 pour currentDayIndex.
    // Un légume est refusé si son dernier jour d'usage est différent du jour courant
    // ET que l'écart (currentDayIndex - dernierJour) est inférieur à 3.
    function autoriseParRegle6(r){
        const legumes = parseLegumes(r.legumes);
        for(const legume of legumes){
            if(dernierUsageLegume.has(legume)){
                const dernierJour = dernierUsageLegume.get(legume);
                // Même jour autorisé (midi + soir peuvent partager le même légume)
                if(dernierJour !== currentDayIndex && currentDayIndex - dernierJour < 3) return false;
            }
        }
        return true;
    }

    // Enregistre les légumes d'un repas dans dernierUsageLegume pour indexJour.
    function enregistrerRegle6(r, indexJour){
        parseLegumes(r.legumes).forEach(l => dernierUsageLegume.set(l, indexJour));
    }

    // Enregistre la viande, le poisson et le féculent d'un repas dans les sets de suivi
    function enregistrerRegle3(r){
        if(r.viande   && r.viande   !== "") viandesUtilises.add(r.viande);
        if(r.poisson  && r.poisson  !== "") poissonsUtilises.add(r.poisson);
        if(r.feculent && r.feculent !== "") feculentsUtilises.add(r.feculent);
    }

    function piocher(pool, idx){
        // Saute les repas déjà utilisés, les Tartes en surnombre (Règle 2a),
        // les repas dont la viande/poisson/féculent est déjà pris (Règle 3),
        // les repas dont l'empreinte correspond aux semaines précédentes (Règle 4),
        // et les repas dont un légume est réapparu trop tôt dans la semaine (Règle 6).
        // Si toutes les règles épuisent le pool, on retourne null sans fallback.
        let i = idx;
        while(i < pool.length){
            const r = pool[i];
            const dejaUtilise  = utilises.includes(r.name);
            const tarteBloquee = tarteUtilisee && r.categorie.toLowerCase() === "tarte";
            const regle3Bloque = !autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises);
            const regle4Bloque = signaturesExclues.has(signature(r));
            // Règle 6 : bloquer si un légume du repas est réapparu moins de 3 jours après
            const regle6Bloque = !autoriseParRegle6(r);

            if(!dejaUtilise && !tarteBloquee && !regle3Bloque && !regle4Bloque && !regle6Bloque){
                // Candidat valide pour toutes les règles (1, 2, 3, 4 et 6)
                utilises.push(r.name);
                if(r.categorie.toLowerCase() === "tarte") tarteUtilisee = true;
                enregistrerRegle3(r);
                return { repas: r, idx: i + 1 };
            }
            i++;
        }

        // Aucun candidat valide : on retourne null sans fallback.
        // Aucune règle n'est jamais relâchée silencieusement ;
        // l'interface affichera "Aucun repas possible" pour cet emplacement.
        return { repas: null, idx: i };
    }

    // ── Règle 5 : pioche spéciale pour le dimanche soir ───────────────────
    // Conditions :
    //   - Pâtes = Oui  (obligatoire)
    //   - Règle 1      : pas de viande ni de poisson (autoriseLeSOir)
    //   - Règle 3 allégée pour le féculent : conflit uniquement avec Lundi et Samedi
    //   - Règle 3 complète pour viande et poisson (toute la semaine)
    //   - Règle 4      : pas de signature présente dans les semaines précédentes
    //   - Règle 6      : écart légumes ≥ 3 jours (même logique que piocher)
    // Si le pool est épuisé, retourne null → "Aucun repas possible".
    function piocherPates(){
        for(let i = 0; i < patesSoirDispo.length; i++){
            const r = patesSoirDispo[i];
            if(utilises.includes(r.name)) continue;
            // Règle 4
            if(signaturesExclues.has(signature(r))) continue;
            // Règle 3 allégée : féculent vérifié uniquement contre Lundi et Samedi
            if(r.feculent && r.feculent !== "" && feculentsSamediLundi.has(r.feculent)) continue;
            // Règle 3 normale : viande et poisson vérifiés sur toute la semaine
            if(r.viande  && r.viande  !== "" && viandesUtilises.has(r.viande))  continue;
            if(r.poisson && r.poisson !== "" && poissonsUtilises.has(r.poisson)) continue;
            // Règle 6 : écart légumes ≥ 3 jours
            if(!autoriseParRegle6(r)) continue;

            utilises.push(r.name);
            enregistrerRegle3(r);
            return r;
        }
        return null; // Aucun plat de pâtes valide disponible
    }

    const semaine = jours.map((jour, indexJour) => {
        let midi = null, soir = null;

        // -- Règle 6 : indiquer le jour courant aux fonctions piocher/piocherPates --
        currentDayIndex = indexJour;

        if(midiActive(jour.toLowerCase())){
            const res = piocher(tousDispo, idxTous);
            midi    = res.repas;
            idxTous = res.idx;
        }

        if(indexJour === 6){
            // -- Règle 5 : dimanche soir = pâtes forcé --
            soir = piocherPates();
        } else {
            const resSoir = piocher(soirDispo, idxSoir);
            soir    = resSoir.repas;
            idxSoir = resSoir.idx;
        }

        // -- Règle 6 : enregistrer les légumes de midi ET soir après attribution --
        // Les deux repas du même jour sont enregistrés avec le même indexJour,
        // ce qui permet à autoriseParRegle6() de les autoriser mutuellement.
        [midi, soir].forEach(r => { if(r) enregistrerRegle6(r, indexJour); });

        // -- Règle 5 : enregistrer les féculents de Lundi (0) et Samedi (5) --
        // Ces féculents seront utilisés pour le check restreint du dimanche soir.
        if(indexJour === 0 || indexJour === 5){
            [midi, soir].forEach(r => {
                if(r && r.feculent && r.feculent !== "") feculentsSamediLundi.add(r.feculent);
            });
        }

        return { midi, soir };
    });

    // -- Règle 2b : forcer une Tarte si aucune n'a été piochée --
    const aTarte = semaine.some(j =>
        (j.midi && j.midi.categorie.toLowerCase() === "tarte") ||
        (j.soir && j.soir.categorie.toLowerCase() === "tarte")
    );

    if(!aTarte && tarteDispo.length > 0){
        const tarte = tarteDispo.find(t => !utilises.includes(t.name));
        if(tarte){
            const candidats = semaine.map((j, i) => i).filter(i =>
                i !== 6 && // Règle 5 : dimanche soir réservé aux pâtes, pas de Tarte
                semaine[i].soir && semaine[i].soir.categorie.toLowerCase() !== "tarte"
            );
            if(candidats.length > 0){
                const idx = candidats[Math.floor(Math.random() * candidats.length)];
                // Retirer les légumes/féculents du repas remplacé avant d'ajouter la tarte
                // (la Règle 3 n'est pas re-vérifiée ici pour ne pas bloquer le fallback Règle 2)
                semaine[idx].soir = tarte;
            }
        }
    }

    return semaine.map(j => ({ midi: j.midi || null, soir: j.soir || null }));
}

// ─── Affichage ────────────────────────────────────────────────────────────

// Crée une box repas.
// repasObj  : objet repas, ou null si aucun repas n'est disponible/stocké
// label     : libellé affiché ("☀️ Midi" / "🌙 Soir")
// onRegen   : callback du bouton 🔄
// nonStocke : true si le jour était non coché lors de la génération
//             → message distinct "➕ Cliquer sur 🔄 pour générer"
//             → false (défaut) = "⚠️ Aucun repas possible" (pool épuisé, Règles 3/4)
function creerRepasBox(repasObj, label, onRegen, nonStocke = false){
    const box = document.createElement("div");
    box.className = "repas-box";
    const header = document.createElement("div");
    header.className = "repas-header";
    const titreEl = document.createElement("div");
    titreEl.className = "repas-titre";
    titreEl.textContent = label;
    const btn = document.createElement("button");
    btn.className = "regen-btn";
    btn.textContent = "🔄";
    btn.title = "Régénérer";
    btn.onclick = onRegen;
    header.appendChild(titreEl);
    header.appendChild(btn);
    const contenuEl = document.createElement("div");
    contenuEl.className = "repas-contenu";
    if(repasObj){
        contenuEl.textContent = repasObj.name || repasObj;
    } else if(nonStocke){
        // Le jour midi n'était pas coché lors de la génération : aucun repas
        // n'a été stocké pour cet emplacement. L'utilisateur peut en générer
        // un à la demande via le bouton 🔄.
        contenuEl.textContent = "Cliquer sur 🔄 pour générer";
        box.classList.add("non-stocke");
    } else {
        // Aucun repas ne satisfait toutes les règles (Règles 3 ou 4 épuisées).
        contenuEl.textContent = "⚠️ Aucun repas possible";
        box.classList.add("impossible");
    }
    box.appendChild(header);
    box.appendChild(contenuEl);
    return box;
}

function afficher(menus){
    dernierMenu = menus;
    const container = document.getElementById("menu");
    container.innerHTML = "";
    menus.forEach((semaine, indexSemaine) => {
        const bloc = document.createElement("div");
        bloc.className = "semaine";
        const titre = document.createElement("h3");
        titre.textContent = semaine.titre;
        const grid = document.createElement("div");
        grid.className = "grid";

        semaine.repas.forEach((plat, i) => {
            const ligne = document.createElement("div");
            ligne.className = "jour";
            const j = document.createElement("span");
            j.className = "nomjour";
            j.textContent = jours[i];
            ligne.appendChild(j);

            if(midiActive(jours[i].toLowerCase())){
                // nonStocke = true si la case midi est désormais cochée mais que ce jour
                // n'avait pas de midi lors de la génération (plat.midi === null).
                // L'utilisateur peut alors utiliser 🔄 pour générer un repas à la demande.
                const nonStocke = !plat.midi;
                ligne.appendChild(creerRepasBox(plat.midi, "☀️ Midi", () => regenererRepas(i, "midi", menus, indexSemaine), nonStocke));
            } else {
                ligne.appendChild(document.createElement("div"));
            }

            ligne.appendChild(creerRepasBox(plat.soir, "🌙 Soir", () => regenererRepas(i, "soir", menus, indexSemaine)));
            grid.appendChild(ligne);
        });

        bloc.appendChild(titre);
        bloc.appendChild(grid);
        container.appendChild(bloc);
    });
}

// ─── Génération ───────────────────────────────────────────────────────────

window.genererMenu = async function(){
    const exclu = historique.map(r => r.name || r);
    // -- Règle 4 : capturer le menu précédent AVANT génération --
    // dernierMenu sera écrasé par afficher() ; on le sauvegarde ici
    // pour que regenererRepas() puisse s'y référer via menuAvantGeneration.
    menuAvantGeneration = dernierMenu;
    const signaturesExclues = extraireSignaturesPrecedentes(menuAvantGeneration, 1);
    const semaine = construireSemaine(exclu, signaturesExclues);
    const menus   = [{ titre: "Semaine", repas: semaine }];
    afficher(menus);
    const noms = semaine.flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

window.generer2Semaines = async function(){
    const menus = [];
    let exclu = historique.map(r => r.name || r);
    // -- Règle 4 : capturer le menu précédent AVANT génération --
    menuAvantGeneration = dernierMenu;
    const signaturesExclues = extraireSignaturesPrecedentes(menuAvantGeneration, 2);
    for(let s = 1; s <= 2; s++){
        const semaine = construireSemaine(exclu, signaturesExclues);
        menus.push({ titre: "Semaine " + s, repas: semaine });
        exclu = [...exclu, ...semaine.flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r)];
    }
    afficher(menus);
    const noms = menus.flatMap(s => s.repas).flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

// ─────────────────────────────────────────────────────────────────────────
// Régénère un seul repas (midi ou soir) en respectant les cinq règles :
//
// RÈGLE 1 – Pas de viande ni de poisson le soir (sauf Tarte)
// RÈGLE 2 – Exactement 1 Tarte par semaine
// RÈGLE 3 – Pas de doublon de viande, poisson ni féculent dans la semaine
// RÈGLE 4 – Pas de repas dont l'empreinte correspond aux semaines précédentes
// RÈGLE 5 – Dimanche soir = plat de pâtes forcé (Pâtes = Oui) :
//   Si l'emplacement régénéré est le dimanche soir (indexJour === 6, moment === "soir"),
//   le filtre force Pâtes=Oui et applique la Règle 3 allégée pour le féculent
//   (vérification uniquement contre Lundi et Samedi). Viande et poisson restent
//   soumis à la Règle 3 complète.
// ─────────────────────────────────────────────────────────────────────────
async function regenererRepas(indexJour, moment, menus, indexSemaine){
    const semaineActuelle = menus[indexSemaine].repas;
    const repasActuel = semaineActuelle[indexJour][moment];

    // -- Règle 2 : comptage des Tartes hors emplacement remplacé --
    const tartesAilleurs = semaineActuelle.reduce((nb, jour, i) => {
        ["midi", "soir"].forEach(m => {
            if(i === indexJour && m === moment) return;
            const r = jour[m];
            if(r && (r.categorie || "").toLowerCase() === "tarte") nb++;
        });
        return nb;
    }, 0);

    const ancienEstTarte = repasActuel && (repasActuel.categorie || "").toLowerCase() === "tarte";
    const doitEtreTarte  = ancienEstTarte && tartesAilleurs === 0;
    const tarteInterdite = tartesAilleurs > 0;

    // -- Règle 3 : collecte des viandes, poissons et féculents déjà utilisés cette semaine --
    // On exclut le repas en cours de remplacement pour ne pas bloquer
    // inutilement sur ses propres viande/poisson/féculent.
    const viandesUtilises   = new Set();
    const poissonsUtilises  = new Set();
    const feculentsUtilises = new Set();
    semaineActuelle.forEach((jour, i) => {
        ["midi", "soir"].forEach(m => {
            if(i === indexJour && m === moment) return; // exclure l'emplacement remplacé
            const r = jour[m];
            if(!r) return;
            if(r.viande   && r.viande   !== "") viandesUtilises.add(r.viande);
            if(r.poisson  && r.poisson  !== "") poissonsUtilises.add(r.poisson);
            if(r.feculent && r.feculent !== "") feculentsUtilises.add(r.feculent);
        });
    });

    // -- Règle 5 : féculents de Lundi (index 0) et Samedi (index 5) uniquement --
    // Utilisé si l'emplacement régénéré est le dimanche soir.
    const estDimancheSoir = (indexJour === 6 && moment === "soir");
    const feculentsSamediLundi = new Set();
    if(estDimancheSoir){
        [0, 5].forEach(idx => {
            ["midi", "soir"].forEach(m => {
                const r = semaineActuelle[idx] && semaineActuelle[idx][m];
                if(r && r.feculent && r.feculent !== "") feculentsSamediLundi.add(r.feculent);
            });
        });
    }

    // -- Règle 6 : map légume → Set d'indices de jours (semaine courante) --
    // Construit à partir de tous les repas de la semaine, en excluant l'emplacement
    // en cours de remplacement (dont les contraintes ne s'appliquent plus).
    // La vérification est bidirectionnelle : on contrôle les jours avant ET après
    // indexJour (|jourVoisin - indexJour| < 3, et jourVoisin ≠ indexJour).
    const legumesDays = new Map();
    semaineActuelle.forEach((jour, i) => {
        ["midi", "soir"].forEach(m => {
            if(i === indexJour && m === moment) return; // exclure l'emplacement remplacé
            const r = jour[m];
            if(!r) return;
            parseLegumes(r.legumes).forEach(legume => {
                if(!legumesDays.has(legume)) legumesDays.set(legume, new Set());
                legumesDays.get(legume).add(i);
            });
        });
    });

    function autoriseParRegle6Regen(r){
        const legumes = parseLegumes(r.legumes);
        for(const legume of legumes){
            if(legumesDays.has(legume)){
                for(const jourIdx of legumesDays.get(legume)){
                    // Même jour autorisé ; jours à moins de 3 de distance = refusé
                    if(jourIdx !== indexJour && Math.abs(jourIdx - indexJour) < 3) return false;
                }
            }
        }
        return true;
    }

    // -- Règle 4 : reconstituer les signatures des semaines précédentes --
    // menus.length indique si on est dans un contexte 1 semaine ou 2 semaines,
    // ce qui détermine combien de semaines précédentes on remonte (même logique
    // que lors de la génération initiale).
    // La signature du repas actuel (en cours de remplacement) est retirée du Set
    // pour ne pas bloquer inutilement la recherche d'un repas de même profil.
    const signaturesExclues = extraireSignaturesPrecedentes(menuAvantGeneration, menus.length);
    if(repasActuel && repasActuel.name) signaturesExclues.delete(signature(repasActuel));

    const tousActuels = menus.flatMap(s => s.repas)
        .flatMap(r => [r.midi, r.soir])
        .filter(Boolean)
        .filter(r => r !== repasActuel)
        .map(r => r.name || r);
    const exclu = [...historique.map(r => r.name || r), ...tousActuels];

    // Construction du filtre combinant Règles 1, 2, 3, 4, 5 et 6.
    // La branche Règle 5 (dimanche soir) est évaluée en premier car elle
    // prime sur toutes les autres contraintes pour cet emplacement.
    let filtre;
    if(estDimancheSoir){
        // Règle 5 : pâtes forcées ; Règle 3 allégée sur le féculent (Lundi+Samedi seulement)
        filtre = r => r.pates
                   && autoriseLeSOir(r)
                   && !(r.feculent && r.feculent !== "" && feculentsSamediLundi.has(r.feculent))
                   && !(r.viande  && r.viande  !== "" && viandesUtilises.has(r.viande))
                   && !(r.poisson && r.poisson !== "" && poissonsUtilises.has(r.poisson))
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    } else if(doitEtreTarte){
        filtre = r => r.categorie.toLowerCase() === "tarte"
                   && autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises)
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    } else if(moment === "soir" && tarteInterdite){
        filtre = r => autoriseLeSOir(r)
                   && r.categorie.toLowerCase() !== "tarte"
                   && autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises)
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    } else if(moment === "soir"){
        filtre = r => autoriseLeSOir(r)
                   && autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises)
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    } else if(tarteInterdite){
        filtre = r => r.categorie.toLowerCase() !== "tarte"
                   && autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises)
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    } else {
        filtre = r => autoriseParRegle3(r, viandesUtilises, poissonsUtilises, feculentsUtilises)
                   && !signaturesExclues.has(signature(r))
                   && autoriseParRegle6Regen(r);
    }

    // Tentative avec toutes les règles (1, 2, 3 et 4 strictement appliquées).
    // Si le résultat est vide, aucun fallback n'est appliqué :
    // le repas sera mis à null et l'interface affichera "Aucun repas possible".
    let liste = piocherAvecFiltre(exclu, 1, filtre);

    if(liste.length > 0){
        menus[indexSemaine].repas[indexJour][moment] = liste[0];
    } else {
        // Aucun repas disponible sans violer au moins une règle.
        // On ne relâche aucune règle ; on signale l'impossibilité via null.
        menus[indexSemaine].repas[indexJour][moment] = null;
    }
    afficher(menus);
    const noms = menus.flatMap(s => s.repas).flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

// ─── Initialisation ───────────────────────────────────────────────────────
(async function(){
    await chargerRepas();
    await chargerDepuisFirebase();

    // ── Listeners sur les cases à cocher Midi ────────────────────────────
    // Quand l'utilisateur coche ou décoche un jour midi APRÈS le chargement,
    // on re-rend le dernier menu connu sans regénérer.
    //
    // Cas possibles selon l'état de midi dans le menu stocké :
    //   • midi présent (objet repas)  → affichage normal du repas
    //   • midi null (jour non coché lors de la génération) → box "⚠️ Aucun repas stocké"
    //     (l'utilisateur peut utiliser 🔄 pour en générer un à la demande)
    //   • case décochée → la colonne midi disparaît (comportement existant)
    jours.forEach(jour => {
        const cb = document.getElementById("midi_" + jour.toLowerCase());
        if(cb){
            cb.addEventListener("change", () => {
                if(dernierMenu) afficher(dernierMenu);
            });
        }
    });
})();
