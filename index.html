<!DOCTYPE html>
<html>

<head>
<title>Planificateur de menus</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:40px;
    display:flex;
    justify-content:center;
}
.app{
    width:800px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-top:0;}
.controls{text-align:center;margin-bottom:20px;}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}
button:hover{background:#2563eb;}
.reset{background:#ef4444;}
.reset:hover{background:#dc2626;}
.semaine{
    margin-top:20px;
    background:#f9fafc;
    padding:15px;
    border-radius:10px;
}
.semaine h3{margin-top:0;}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}
.jour{
    background:white;
    padding:10px;
    border-radius:6px;
    display:grid;
    grid-template-columns: 120px 1fr 1fr;
    align-items:center;
    border:1px solid #eee;
    gap:10px;
}
.nomjour{
    font-weight:bold;
    color:#555;
    min-width:90px;
    display:flex;
    align-items:center;
}
.parametres-bloc {
    background: #f0f4ff;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 15px;
}
.parametres-titre {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 16px;
    color: #374151;
}
.parametres-grid {
    display: grid;
    grid-template-columns: auto repeat(7, 1fr);
    gap: 6px 10px;
    align-items: center;
}
.param-jour {
    font-weight: bold;
    font-size: 13px;
    color: #4b5563;
    text-align: center;
}
.param-row-label {
    font-size: 14px;
    color: #6b7280;
    white-space: nowrap;
    padding-right: 4px;
}
.param-check {
    display: flex;
    justify-content: center;
    cursor: pointer;
}
.param-check input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #3b82f6;
}
.firebase-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    border: 1px solid #e5e7eb;
    background: #f9fafb;
    color: #6b7280;
}
.firebase-status.ok { background:#f0fdf4; border-color:#bbf7d0; color:#15803d; }
.firebase-status.erreur { background:#fef2f2; border-color:#fecaca; color:#dc2626; }
.firebase-status.chargement { background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
.firebase-status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
}
.firebase-status .badge {
    margin-left: auto;
    border-radius: 999px;
    padding: 2px 10px;
    font-weight: bold;
    white-space: nowrap;
}
.firebase-status.ok .badge { background:#dcfce7; color:#15803d; }
.firebase-status.erreur .badge { background:#fee2e2; color:#dc2626; }
.firebase-status.chargement .badge { background:#dbeafe; color:#1d4ed8; }
.repas-box .regen-btn {
    background: transparent;
    color: #9ca3af;
    border: none;
    padding: 0;
    margin: 0;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
}
.repas-box .regen-btn:hover {
    color: #3b82f6;
    background: #dbeafe;
}
.repas-box{
    background:#f9fafc;
    border-radius:6px;
    padding:8px;
    display:flex;
    flex-direction:column;
    border-left:3px solid #e5e7eb;
}
.repas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
}
.repas-titre{ font-size:12px; color:#6b7280; }
.repas-contenu{ font-size:14px; font-weight:500; }
.repas-box.impossible {
    border-left-color: #f97316;
    background: #fff7ed;
}
.repas-box.impossible .repas-contenu {
    color: #c2410c;
    font-style: italic;
    font-size: 13px;
}
</style>
</head>

<body>
<div class="app">
<h1>Planificateur de menus</h1>

<div class="parametres-bloc">
    <div class="parametres-titre">⚙️ Paramètres</div>
    <div class="parametres-grid">
        <div></div>
        <div class="param-jour">Lundi</div>
        <div class="param-jour">Mardi</div>
        <div class="param-jour">Mercredi</div>
        <div class="param-jour">Jeudi</div>
        <div class="param-jour">Vendredi</div>
        <div class="param-jour">Samedi</div>
        <div class="param-jour">Dimanche</div>
        <div class="param-row-label">☀️ Midi</div>
        <label class="param-check"><input type="checkbox" id="midi_lundi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mardi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mercredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_jeudi"></label>
        <label class="param-check"><input type="checkbox" id="midi_vendredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_samedi" checked></label>
        <label class="param-check"><input type="checkbox" id="midi_dimanche" checked></label>
    </div>
</div>

<div id="firebaseStatus" class="firebase-status chargement">
    <span class="dot"></span>
    <span id="firebaseStatusText">Connexion à Firebase…</span>
    <span class="badge" id="firebaseBadge">chargement</span>
</div>

<div class="controls">
    <button onclick="genererMenu()">Générer une semaine</button>
    <button onclick="generer2Semaines()">Générer 2 semaines</button>
    <button class="reset" onclick="resetHistorique()">Réinitialiser l'historique</button>
</div>

<div id="menu"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ─── Configuration Firebase ───────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyA7-OjvE2UEfy0DtxGuEP9kJ9iM4OslUvI",
    authDomain: "menus-ce381.firebaseapp.com",
    projectId: "menus-ce381",
    storageBucket: "menus-ce381.firebasestorage.app",
    messagingSenderId: "828215763434",
    appId: "1:828215763434:web:d9686690f65b59c8871293"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const DOC_HISTORIQUE = doc(db, "historique", "precedent");
const DOC_MENU       = doc(db, "historique", "dernier_menu");

const jours = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];

// Tableau des repas chargés depuis le CSV.
// Chaque entrée contient : { name, legumes, feculent, viande, categorie }
let repas = [];

let historique  = [];
let dernierMenu = null;

// ─── Utilitaires Firebase ─────────────────────────────────────────────────

function setStatut(etat, texte, badge){
    const el = document.getElementById("firebaseStatus");
    el.className = "firebase-status " + etat;
    document.getElementById("firebaseStatusText").textContent = texte;
    document.getElementById("firebaseBadge").textContent = badge;
}

async function chargerDepuisFirebase(){
    try {
        const snapHisto = await getDoc(DOC_HISTORIQUE);
        historique = snapHisto.exists() ? (snapHisto.data().repas || []) : [];

        const snapMenu = await getDoc(DOC_MENU);
        dernierMenu = snapMenu.exists() ? (snapMenu.data().menus || null) : null;

        setStatut("ok", "Firebase connecté — historique synchronisé sur tous vos appareils", historique.length + " repas exclus");
        if(dernierMenu) afficher(dernierMenu);
    } catch(e){
        setStatut("erreur", "Erreur Firebase : " + e.message, "hors ligne");
    }
}

async function sauvegarderDansFirebase(repasGeneres, menus){
    historique = repasGeneres;
    try {
        await setDoc(DOC_HISTORIQUE, { repas: historique });
        await setDoc(DOC_MENU, { menus: menus });
        setStatut("ok", "Historique sauvegardé ✓ — synchronisé sur tous vos appareils", historique.length + " repas exclus");
    } catch(e){
        setStatut("erreur", "Sauvegarde échouée : " + e.message, "erreur");
    }
}

window.resetHistorique = async function(){
    historique  = [];
    dernierMenu = null;
    try {
        await setDoc(DOC_HISTORIQUE, { repas: [] });
        await setDoc(DOC_MENU, { menus: null });
        setStatut("ok", "Historique réinitialisé ✓", "0 repas exclus");
    } catch(e){
        setStatut("erreur", "Erreur lors de la réinitialisation", "erreur");
    }
    document.getElementById("menu").innerHTML = "";
}

// ─── Chargement du CSV ────────────────────────────────────────────────────

async function chargerRepas(){
    const response = await fetch("repas.csv");
    const texte    = await response.text();
    const lignes   = texte.split("\n").map(r => r.trim()).filter(r => r !== "");
    // Colonnes parsées :
    //   cols[0] = Nom complet  → nom affiché
    //   cols[1] = Légumes      → utilisé par la Règle 3 (pas de doublon de légume)
    //   cols[2] = Féculent     → utilisé par la Règle 3 (pas de doublon de féculent)
    //   cols[3] = Viande       → utilisé par la Règle 1 (pas de viande le soir)
    //   cols[4] = Catégorie    → utilisé par les Règles 1 et 2 (exception Tarte)
    repas = lignes.slice(1).map(r => {
        const cols = r.split(";");
        return {
            name:      (cols[0] || "").replace(/^"/, "").replace(/"$/, "").trim(),
            legumes:   (cols[1] || "").trim(),
            feculent:  (cols[2] || "").trim(),
            viande:    (cols[3] || "").trim(),
            categorie: (cols[4] || "").trim()
        };
    }).filter(r => r.name !== "");
}

// ─── Utilitaires généraux ─────────────────────────────────────────────────

function shuffle(a){ return a.sort(() => Math.random() - 0.5); }
function midiActive(jour){ return document.getElementById("midi_" + jour).checked; }

// ─────────────────────────────────────────────────────────────────────────
// RÈGLE 1 : Pas de viande le soir (sauf catégorie Tarte)
// ─────────────────────────────────────────────────────────────────────────
function autoriseLeSOir(r){
    const aViande  = r.viande && r.viande !== "";
    const estTarte = r.categorie.toLowerCase() === "tarte";
    return !aViande || estTarte;
}

// ─────────────────────────────────────────────────────────────────────────
// RÈGLE 3 : Pas de doublon de légume ni de féculent dans la même semaine.
//
// Un repas contient potentiellement un légume (colonne "Légumes") et/ou
// un féculent (colonne "Féculent"). Pour éviter la monotonie, on s'assure
// qu'aucun légume et qu'aucun féculent n'apparaît deux fois dans la même
// semaine générée.
//
// Fonctionnement :
//   - legumesUtilises  : ensemble (Set) des légumes déjà présents dans la semaine
//   - feculentsUtilises : ensemble (Set) des féculents déjà présents dans la semaine
//
// Un repas est refusé si :
//   - Son légume (non vide) est déjà dans legumesUtilises
//   - OU son féculent (non vide) est déjà dans feculentsUtilises
//
// Les légumes/féculents vides ("") sont ignorés (pas de contrainte).
//
// Cette règle s'applique :
//   1. Dans construireSemaine() lors de la génération initiale
//   2. Dans regenererRepas() lors du rechargement manuel d'un repas
// ─────────────────────────────────────────────────────────────────────────
function autoriseParRegle3(r, legumesUtilises, feculentsUtilises){
    // Si le repas a un légume déjà utilisé cette semaine → refusé
    if(r.legumes && r.legumes !== "" && legumesUtilises.has(r.legumes)) return false;
    // Si le repas a un féculent déjà utilisé cette semaine → refusé
    if(r.feculent && r.feculent !== "" && feculentsUtilises.has(r.feculent)) return false;
    return true;
}

// Pioche `nb` repas aléatoires hors de la liste `exclu`,
// avec un filtre optionnel (ex. : autoriseLeSOir).
// Si pas assez de repas disponibles après exclusion, on relâche l'historique.
function piocherAvecFiltre(exclu, nb, filtre){
    let liste = shuffle([...repas])
        .filter(r => !exclu.includes(r.name))
        .filter(filtre || (() => true));
    if(liste.length < nb){
        liste = shuffle([...repas]).filter(filtre || (() => true));
    }
    return liste.slice(0, nb);
}

// ─────────────────────────────────────────────────────────────────────────
// Construction d'une semaine de menus en appliquant les trois règles :
//
// RÈGLE 1 – Pas de viande le soir (sauf Tarte)
// RÈGLE 2 – Exactement 1 Tarte par semaine
// RÈGLE 3 – Pas de doublon de légume ni de féculent dans la semaine
//   Les sets legumesUtilises et feculentsUtilises sont mis à jour après
//   chaque repas attribué. Lors de la pioche, la fonction autoriseParRegle3
//   filtre les candidats en temps réel. Si le pool est épuisé avec la
//   contrainte Règle 3, on relâche uniquement cette contrainte (pour éviter
//   un blocage total sur les petits pools).
// ─────────────────────────────────────────────────────────────────────────
function construireSemaine(exclu){
    const tousDispo  = shuffle([...repas]).filter(r => !exclu.includes(r.name));
    const soirDispo  = tousDispo.filter(r => autoriseLeSOir(r));
    const tarteDispo = tousDispo.filter(r => r.categorie.toLowerCase() === "tarte");

    let idxTous = 0;
    let idxSoir = 0;

    const utilises = [];
    let tarteUtilisee = false;

    // -- Règle 3 : suivi des légumes et féculents déjà utilisés cette semaine --
    const legumesUtilises   = new Set();
    const feculentsUtilises = new Set();

    // Enregistre le légume et le féculent d'un repas dans les sets de suivi
    function enregistrerRegle3(r){
        if(r.legumes  && r.legumes  !== "") legumesUtilises.add(r.legumes);
        if(r.feculent && r.feculent !== "") feculentsUtilises.add(r.feculent);
    }

    function piocher(pool, idx){
        // Saute les repas déjà utilisés, les Tartes en surnombre (Règle 2a),
        // et les repas dont le légume ou le féculent est déjà pris (Règle 3).
        // Si la Règle 3 épuise le pool, on relâche uniquement cette contrainte.
        let i = idx;
        while(i < pool.length){
            const r = pool[i];
            const dejaUtilise  = utilises.includes(r.name);
            const tarteBloquee = tarteUtilisee && r.categorie.toLowerCase() === "tarte";
            const regle3Bloque = !autoriseParRegle3(r, legumesUtilises, feculentsUtilises);

            if(!dejaUtilise && !tarteBloquee && !regle3Bloque){
                // Candidat valide pour toutes les règles (1, 2 et 3)
                utilises.push(r.name);
                if(r.categorie.toLowerCase() === "tarte") tarteUtilisee = true;
                enregistrerRegle3(r);
                return { repas: r, idx: i + 1 };
            }
            i++;
        }

        // Aucun candidat valide : on retourne null sans fallback.
        // La Règle 3 n'est jamais relâchée silencieusement ;
        // l'interface affichera "Aucun repas possible" pour cet emplacement.
        return { repas: null, idx: i };
    }

    const semaine = jours.map(jour => {
        let midi = null, soir = null;

        if(midiActive(jour.toLowerCase())){
            const res = piocher(tousDispo, idxTous);
            midi    = res.repas;
            idxTous = res.idx;
        }

        const resSoir = piocher(soirDispo, idxSoir);
        soir    = resSoir.repas;
        idxSoir = resSoir.idx;

        return { midi, soir };
    });

    // -- Règle 2b : forcer une Tarte si aucune n'a été piochée --
    const aTarte = semaine.some(j =>
        (j.midi && j.midi.categorie.toLowerCase() === "tarte") ||
        (j.soir && j.soir.categorie.toLowerCase() === "tarte")
    );

    if(!aTarte && tarteDispo.length > 0){
        const tarte = tarteDispo.find(t => !utilises.includes(t.name));
        if(tarte){
            const candidats = semaine.map((j, i) => i).filter(i =>
                semaine[i].soir && semaine[i].soir.categorie.toLowerCase() !== "tarte"
            );
            if(candidats.length > 0){
                const idx = candidats[Math.floor(Math.random() * candidats.length)];
                // Retirer les légumes/féculents du repas remplacé avant d'ajouter la tarte
                // (la Règle 3 n'est pas re-vérifiée ici pour ne pas bloquer le fallback Règle 2)
                semaine[idx].soir = tarte;
            }
        }
    }

    return semaine.map(j => ({ midi: j.midi || null, soir: j.soir || null }));
}

// ─── Affichage ────────────────────────────────────────────────────────────

function creerRepasBox(repasObj, label, onRegen){
    const box = document.createElement("div");
    box.className = "repas-box";
    const header = document.createElement("div");
    header.className = "repas-header";
    const titreEl = document.createElement("div");
    titreEl.className = "repas-titre";
    titreEl.textContent = label;
    const btn = document.createElement("button");
    btn.className = "regen-btn";
    btn.textContent = "🔄";
    btn.title = "Régénérer";
    btn.onclick = onRegen;
    header.appendChild(titreEl);
    header.appendChild(btn);
    const contenuEl = document.createElement("div");
    contenuEl.className = "repas-contenu";
    if(repasObj){
        contenuEl.textContent = repasObj.name || repasObj;
    } else {
        // Aucun repas ne satisfait toutes les règles (typiquement la Règle 3 :
        // tous les légumes/féculents disponibles sont déjà utilisés cette semaine).
        contenuEl.textContent = "⚠️ Aucun repas possible";
        box.classList.add("impossible");
    }
    box.appendChild(header);
    box.appendChild(contenuEl);
    return box;
}

function afficher(menus){
    dernierMenu = menus;
    const container = document.getElementById("menu");
    container.innerHTML = "";
    menus.forEach((semaine, indexSemaine) => {
        const bloc = document.createElement("div");
        bloc.className = "semaine";
        const titre = document.createElement("h3");
        titre.textContent = semaine.titre;
        const grid = document.createElement("div");
        grid.className = "grid";

        semaine.repas.forEach((plat, i) => {
            const ligne = document.createElement("div");
            ligne.className = "jour";
            const j = document.createElement("span");
            j.className = "nomjour";
            j.textContent = jours[i];
            ligne.appendChild(j);

            if(midiActive(jours[i].toLowerCase())){
                ligne.appendChild(creerRepasBox(plat.midi, "☀️ Midi", () => regenererRepas(i, "midi", menus, indexSemaine)));
            } else {
                ligne.appendChild(document.createElement("div"));
            }

            ligne.appendChild(creerRepasBox(plat.soir, "🌙 Soir", () => regenererRepas(i, "soir", menus, indexSemaine)));
            grid.appendChild(ligne);
        });

        bloc.appendChild(titre);
        bloc.appendChild(grid);
        container.appendChild(bloc);
    });
}

// ─── Génération ───────────────────────────────────────────────────────────

window.genererMenu = async function(){
    const exclu   = historique.map(r => r.name || r);
    const semaine = construireSemaine(exclu);
    const menus   = [{ titre: "Semaine", repas: semaine }];
    afficher(menus);
    const noms = semaine.flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

window.generer2Semaines = async function(){
    const menus = [];
    let exclu = historique.map(r => r.name || r);
    for(let s = 1; s <= 2; s++){
        const semaine = construireSemaine(exclu);
        menus.push({ titre: "Semaine " + s, repas: semaine });
        exclu = [...exclu, ...semaine.flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r)];
    }
    afficher(menus);
    const noms = menus.flatMap(s => s.repas).flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

// ─────────────────────────────────────────────────────────────────────────
// Régénère un seul repas (midi ou soir) en respectant les trois règles :
//
// RÈGLE 1 – Pas de viande le soir (sauf Tarte)
// RÈGLE 2 – Exactement 1 Tarte par semaine
// RÈGLE 3 – Pas de doublon de légume ni de féculent dans la semaine :
//   Avant de piocher, on collecte les légumes et féculents déjà présents
//   dans la semaine (en excluant le repas en cours de remplacement, dont
//   les contraintes ne s'appliquent plus). Le nouveau repas ne doit pas
//   introduire un légume ou un féculent déjà présent ailleurs dans la
//   semaine. Si aucun repas ne satisfait la Règle 3 (pool épuisé), elle
//   est relâchée en dernier recours pour éviter un blocage.
// ─────────────────────────────────────────────────────────────────────────
async function regenererRepas(indexJour, moment, menus, indexSemaine){
    const semaineActuelle = menus[indexSemaine].repas;
    const repasActuel = semaineActuelle[indexJour][moment];

    // -- Règle 2 : comptage des Tartes hors emplacement remplacé --
    const tartesAilleurs = semaineActuelle.reduce((nb, jour, i) => {
        ["midi", "soir"].forEach(m => {
            if(i === indexJour && m === moment) return;
            const r = jour[m];
            if(r && (r.categorie || "").toLowerCase() === "tarte") nb++;
        });
        return nb;
    }, 0);

    const ancienEstTarte = repasActuel && (repasActuel.categorie || "").toLowerCase() === "tarte";
    const doitEtreTarte  = ancienEstTarte && tartesAilleurs === 0;
    const tarteInterdite = tartesAilleurs > 0;

    // -- Règle 3 : collecte des légumes et féculents déjà utilisés cette semaine --
    // On exclut le repas en cours de remplacement pour ne pas bloquer
    // inutilement sur ses propres légume/féculent.
    const legumesUtilises   = new Set();
    const feculentsUtilises = new Set();
    semaineActuelle.forEach((jour, i) => {
        ["midi", "soir"].forEach(m => {
            if(i === indexJour && m === moment) return; // exclure l'emplacement remplacé
            const r = jour[m];
            if(!r) return;
            if(r.legumes  && r.legumes  !== "") legumesUtilises.add(r.legumes);
            if(r.feculent && r.feculent !== "") feculentsUtilises.add(r.feculent);
        });
    });

    const tousActuels = menus.flatMap(s => s.repas)
        .flatMap(r => [r.midi, r.soir])
        .filter(Boolean)
        .filter(r => r !== repasActuel)
        .map(r => r.name || r);
    const exclu = [...historique.map(r => r.name || r), ...tousActuels];

    // Construction du filtre combinant Règle 1, Règle 2 et Règle 3.
    // La Règle 3 est intégrée dans chaque branche pour s'appliquer
    // conjointement aux autres contraintes.
    let filtre;
    if(doitEtreTarte){
        // Règle 2 : doit être une Tarte (les Tartes sont autorisées le soir → Règle 1 OK)
        // Règle 3 : appliquée en plus
        filtre = r => r.categorie.toLowerCase() === "tarte"
                   && autoriseParRegle3(r, legumesUtilises, feculentsUtilises);
    } else if(moment === "soir" && tarteInterdite){
        // Règle 1 + Règle 2 + Règle 3
        filtre = r => autoriseLeSOir(r)
                   && r.categorie.toLowerCase() !== "tarte"
                   && autoriseParRegle3(r, legumesUtilises, feculentsUtilises);
    } else if(moment === "soir"){
        // Règle 1 + Règle 3
        filtre = r => autoriseLeSOir(r)
                   && autoriseParRegle3(r, legumesUtilises, feculentsUtilises);
    } else if(tarteInterdite){
        // Règle 2 + Règle 3
        filtre = r => r.categorie.toLowerCase() !== "tarte"
                   && autoriseParRegle3(r, legumesUtilises, feculentsUtilises);
    } else {
        // Uniquement Règle 3 (midi sans contrainte Tarte)
        filtre = r => autoriseParRegle3(r, legumesUtilises, feculentsUtilises);
    }

    // Tentative avec toutes les règles (Règles 1, 2 et 3 strictement appliquées).
    // Si le résultat est vide, aucun fallback n'est appliqué :
    // le repas sera mis à null et l'interface affichera "Aucun repas possible".
    let liste = piocherAvecFiltre(exclu, 1, filtre);

    if(liste.length > 0){
        menus[indexSemaine].repas[indexJour][moment] = liste[0];
    } else {
        // -- Règle 3 : aucun repas disponible sans doublon de légume/féculent --
        // On ne relâche pas la règle ; on signale l'impossibilité via null.
        menus[indexSemaine].repas[indexJour][moment] = null;
    }
    afficher(menus);
    const noms = menus.flatMap(s => s.repas).flatMap(r => [r.midi, r.soir]).filter(Boolean).map(r => r.name || r);
    await sauvegarderDansFirebase(noms, menus);
}

// ─── Initialisation ───────────────────────────────────────────────────────
(async function(){
    await chargerRepas();
    await chargerDepuisFirebase();
})();
