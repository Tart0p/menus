<!DOCTYPE html>
<html>

<head>
<title>Planificateur de menus</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:40px;
    display:flex;
    justify-content:center;
}
.app{
    width:800px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-top:0;}
.controls{text-align:center;margin-bottom:20px;}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}
button:hover{background:#2563eb;}
.reset{background:#ef4444;}
.reset:hover{background:#dc2626;}
.semaine{
    margin-top:20px;
    background:#f9fafc;
    padding:15px;
    border-radius:10px;
}
.semaine h3{margin-top:0;}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}
.jour{
    background:white;
    padding:10px;
    border-radius:6px;
    display:grid;
    grid-template-columns: 120px 1fr 1fr; /* jour | midi | soir */
    align-items:center;
    border:1px solid #eee;
    gap:10px;
}
.nomjour{
    font-weight:bold;
    color:#555;
    min-width:90px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.midibox-compact-responsive {
    background: #f0f4ff;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    max-width: 100%;
}

.midibox-title {
    font-weight: bold;
    margin-bottom: 8px;
}

.midicheck-responsive {
    display: flex;
    flex-wrap: wrap;        /* permet le passage à plusieurs lignes sur mobile */
    gap: 8px;
    justify-content: flex-start;
}

.midicheck-responsive label {
    padding: 5px 10px;
    border-radius: 4px;
    transition: background 0.2s;
    cursor: pointer;
}

/* effet au survol */
.midicheck-responsive label:hover {
    background: #e0e7ff;
}

/* écran large : alignement sur une seule ligne si possible */
@media (min-width: 600px) {
    .midicheck-responsive {
        flex-wrap: nowrap;
    }
}


.jour button {
    background: #f3f4f6; /* gris clair discret */
    color: #3b82f6;      /* bleu pour rester visible */
    border: none;
    padding: 2px 6px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 8px;
    transition: background 0.2s;
}

.jour button:hover {
    background: #dbeafe; /* léger survol bleu clair */
}

.repas-box{
    background:#f9fafc;
    border-radius:6px;
    padding:8px;
    display:flex;
    flex-direction:column;
	border-left:3px solid #e5e7eb;
}

.repas-titre{
    font-size:12px;
    color:#6b7280;
    margin-bottom:2px;
}

.repas-contenu{
    font-size:14px;
    font-weight:500;
}


</style>
</head>

<body>
<div class="app">
<h1>Planificateur de menus</h1>

<div class="midibox-compact-responsive">
    <div class="midibox-title">☀️ Repas du midi</div>
    <div class="midicheck-responsive">
        <label><input type="checkbox" id="midi_lundi"> Lundi</label>
        <label><input type="checkbox" id="midi_mardi"> Mardi</label>
        <label><input type="checkbox" id="midi_mercredi"> Mercredi</label>
        <label><input type="checkbox" id="midi_jeudi"> Jeudi</label>
        <label><input type="checkbox" id="midi_vendredi"> Vendredi</label>
        <label><input type="checkbox" id="midi_samedi" checked> Samedi</label>
        <label><input type="checkbox" id="midi_dimanche" checked> Dimanche</label>
    </div>
</div>

<div class="controls">
<button onclick="genererMenu()">Générer une semaine</button>
<button onclick="generer2Semaines()">Générer 2 semaines</button>
<button class="reset" onclick="resetHistorique()">Réinitialiser l'historique</button>
</div>

<div id="menu"></div>
</div>

<script>
let repas = []

async function chargerRepas(){
    const response = await fetch("repas.csv")
    const texte = await response.text()

    const lignes = texte
        .split("\n")
        .map(l => l.trim())
        .filter(l => l !== "")

    // Récupération de l'en-tête (1ère ligne) pour identifier les colonnes
    const entete = lignes[0].split(";").map(col => col.trim().replace(/^\uFEFF/, ""))
    const colNom = entete.indexOf("Nom complet")

    // Parsing des lignes de données (à partir de la 2ème ligne)
    repas = lignes.slice(1).map(ligne => {
        const cols = ligne.split(";")
        return { name: cols[colNom]?.trim() || "" }
    }).filter(r => r.name !== "")
}

const jours=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"]

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function midiActive(jour){return document.getElementById("midi_"+jour).checked;}

function calculerNbPlats(){
    let nbPlats = 7;
    jours.forEach(j=>{ if(midiActive(j.toLowerCase())) nbPlats++; });
    return nbPlats;
}

function piocherRepas(exclu, nbPlats){
    let liste = shuffle([...repas]).filter(r => !exclu.includes(r.name))
    if(liste.length < nbPlats) liste = shuffle([...repas])
    return liste.slice(0, nbPlats)
}

function sauvegarderMenu(menus){
    const dernier = menus[0].repas.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    localStorage.setItem("menu_precedent", JSON.stringify(dernier))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function afficher(menus){
    const container=document.getElementById("menu")
    container.innerHTML=""
    menus.forEach((semaine, indexSemaine) => {
        const bloc=document.createElement("div")
        bloc.className="semaine"
        const titre=document.createElement("h3")
        titre.textContent=semaine.titre
        const grid=document.createElement("div")
        grid.className="grid"


        semaine.repas.forEach((plat,i)=>{
            const ligne=document.createElement("div")
            ligne.className="jour"

            const j=document.createElement("span")
            j.className="nomjour"
            j.textContent=jours[i]

          // bouton
const btn = document.createElement("button")
btn.textContent = "🔄"
btn.style.marginLeft = "6px"
btn.style.fontSize = "14px"
btn.onclick = ()=>regenererJour(i, menus, indexSemaine)

j.appendChild(btn)

// === COLONNE 1 : JOUR ===
ligne.appendChild(j)

// === COLONNE 2 : MIDI ===
if(midiActive(jours[i].toLowerCase())){
    const midiBox = document.createElement("div")
    midiBox.className = "repas-box"

    const midiTitre = document.createElement("div")
    midiTitre.className = "repas-titre"
    midiTitre.textContent = "☀️ Midi"

    const midiContenu = document.createElement("div")
    midiContenu.className = "repas-contenu"
    midiContenu.textContent = plat.midi || "-"

    midiBox.appendChild(midiTitre)
    midiBox.appendChild(midiContenu)

    ligne.appendChild(midiBox)
} else {
    // IMPORTANT : colonne vide pour garder l'alignement
    const vide = document.createElement("div")
    ligne.appendChild(vide)
}

// === COLONNE 3 : SOIR ===
const soirBox = document.createElement("div")
soirBox.className = "repas-box"

const soirTitre = document.createElement("div")
soirTitre.className = "repas-titre"
soirTitre.textContent = "🌙 Soir"

const soirContenu = document.createElement("div")
soirContenu.className = "repas-contenu"
soirContenu.textContent = plat.soir || "-"

soirBox.appendChild(soirTitre)
soirBox.appendChild(soirContenu)

ligne.appendChild(soirBox)
            grid.appendChild(ligne)
        })

        bloc.appendChild(titre)
        bloc.appendChild(grid)
        container.appendChild(bloc)
    })
}

function genererMenu() {
let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || [];
let nbPlats = calculerNbPlats();
const selection = piocherRepas(precedent, nbPlats);
   
   let index = 0;

    const menus = [{
        titre: "Semaine",
        repas: jours.map(jour => {
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){
                midi = selection[index]?.name || null; index++;
            }
            soir = selection[index]?.name || null; index++;
            return {midi, soir};
        })
    }];

    afficher(menus);

sauvegarderMenu(menus)
}

function generer2Semaines(){
    let liste = [...repas]
    let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || []
    const menus = []
    for(let s=1; s<=2; s++){
		let nbPlats = calculerNbPlats();
		const selection = piocherRepas(precedent, nbPlats)
        let index=0
        const semaine = jours.map(jour=>{
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){ midi=selection[index]?.name||null; index++; }
            soir=selection[index]?.name||null; index++;
            return {midi, soir}
        })
        menus.push({titre:"Semaine "+s, repas:semaine})
        precedent = semaine.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    }
    afficher(menus)
    localStorage.setItem("menu_precedent", JSON.stringify(precedent))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function resetHistorique(){
    localStorage.clear()
    document.getElementById("menu").innerHTML=""
}

function regenererJour(indexJour, menus, indexSemaine){
    const jourID = jours[indexJour].toLowerCase()
   let semaine = menus[indexSemaine].repas
    let exclu = menus.flatMap(s=>s.repas).flatMap(r=>[r.midi,r.soir]).filter(Boolean)
	let liste = piocherRepas(exclu, 2)
    let index=0
    if(midiActive(jourID)){
        semaine[indexJour].midi = liste[index]?.name || semaine[indexJour].midi; index++
    }
    semaine[indexJour].soir = liste[index]?.name || semaine[indexJour].soir; index++
    afficher(menus)
sauvegarderMenu(menus)
}

window.onload=async function(){

    await chargerRepas()

    const dernier = JSON.parse(localStorage.getItem("menu_derniere_generation"))

    if(dernier) afficher(dernier)

}
</script>
</body>
</html>
