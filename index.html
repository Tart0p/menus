<!DOCTYPE html>
<html>
<head>
<title>Générateur de menu</title>
<style>
body{
font-family:Arial;
max-width:600px;
margin:auto;
padding:20px;
}
button{
padding:10px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Menu de la semaine</h1>

<label>
<input type="checkbox" id="viande">
Inclure les repas avec viande
</label>

<br><br>

<button onclick="genererMenu()">Générer le menu</button>
<button onclick="generer4Semaines()">Générer 4 semaines</button>

<h2>Résultat</h2>

<ul id="menu"></ul>

<script>

const repas = [
{name:"Lasagnes", viande:true},
{name:"Poulet curry", viande:true},
{name:"Burger", viande:true},
{name:"Chili con carne", viande:true},
{name:"Tacos", viande:true},

{name:"Omelette", viande:false},
{name:"Risotto champignons", viande:false},
{name:"Curry légumes", viande:false},
{name:"Salade grecque", viande:false},
{name:"Pizza margherita", viande:false},
{name:"Riz sauté légumes", viande:false},
{name:"Pâtes pesto", viande:false},
{name:"Soupe légumes", viande:false},
{name:"Quiche légumes", viande:false},
{name:"Gratin pommes de terre", viande:false},
{name:"Falafel", viande:false},
{name:"Couscous légumes", viande:false},
{name:"Pad thai végétarien", viande:false},
{name:"Salade quinoa", viande:false},
{name:"Tarte tomate", viande:false}
];

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function genererMenu(){

const inclureViande =
document.getElementById("viande").checked;

let liste = repas.filter(r=>{
if(inclureViande) return true
return r.viande === false
})

const precedent =
JSON.parse(localStorage.getItem("menu_precedent")) || []

liste = liste.filter(r =>
!precedent.includes(r.name)
)

liste = shuffle(liste)

const semaine = liste.slice(0,7)

localStorage.setItem(
"menu_precedent",
JSON.stringify(semaine.map(r=>r.name))
)

const jours = [
"Lundi","Mardi","Mercredi",
"Jeudi","Vendredi","Samedi","Dimanche"
]

const ul = document.getElementById("menu")
ul.innerHTML=""

semaine.forEach((repas,i)=>{
const li = document.createElement("li")
li.textContent = jours[i] + " : " + repas.name
ul.appendChild(li)
})

}

function generer4Semaines(){

    const inclureViande = document.getElementById("viande").checked;

    // Filtre les repas selon le choix viande / végétarien
    let liste = repas.filter(r => inclureViande || r.viande === false);

    const jours = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
    const ul = document.getElementById("menu");
    ul.innerHTML = "";

    let semainePrecedente = JSON.parse(localStorage.getItem("menu_precedent")) || [];

    // On crée une copie de la liste pour la manipulation
    let listeDisponible = [...liste];

    for(let s=1; s<=4; s++){

        // Exclure les repas de la semaine précédente
        let listeSemaine = listeDisponible.filter(r => !semainePrecedente.includes(r.name));

        // Si moins de 7 repas disponibles, on remélange la liste totale pour compléter
        if(listeSemaine.length < 7){
            listeSemaine = shuffle(liste).filter(r => !semainePrecedente.includes(r.name));
        }

        listeSemaine = shuffle(listeSemaine);

        const semaine = listeSemaine.slice(0,7);

        // Affichage
        const titre = document.createElement("h3");
        titre.textContent = "Semaine " + s;
        ul.appendChild(titre);

        semaine.forEach((repasChoisi, i) => {
            const li = document.createElement("li");
            li.textContent = jours[i] + " : " + repasChoisi.name;
            ul.appendChild(li);
        });

        // La semaine actuelle devient la "semaine précédente" pour la suivante
        semainePrecedente = semaine.map(r => r.name);
    }

    // On sauvegarde uniquement la dernière semaine générée
    localStorage.setItem("menu_precedent", JSON.stringify(semainePrecedente));
}

// Fonction shuffle
function shuffle(array){
    return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
