<!DOCTYPE html>
<html>

<head>
<title>Planificateur de menus</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:40px;
    display:flex;
    justify-content:center;
}
.app{
    width:800px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-top:0;}
.controls{text-align:center;margin-bottom:20px;}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}
button:hover{background:#2563eb;}
.reset{background:#ef4444;}
.reset:hover{background:#dc2626;}
.semaine{
    margin-top:20px;
    background:#f9fafc;
    padding:15px;
    border-radius:10px;
}
.semaine h3{margin-top:0;}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}
.jour{
    background:white;
    padding:10px;
    border-radius:6px;
    display:grid;
    grid-template-columns: 120px 1fr 1fr;
    align-items:center;
    border:1px solid #eee;
    gap:10px;
}
.nomjour{
    font-weight:bold;
    color:#555;
    min-width:90px;
    display:flex;
    align-items:center;
}

/* === BLOC PARAMÈTRES === */
.parametres-bloc {
    background: #f0f4ff;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.parametres-titre {
    font-weight: bold;
    margin-bottom: 12px;
    font-size: 16px;
    color: #374151;
}

.parametres-grid {
    display: grid;
    grid-template-columns: auto repeat(7, 1fr);
    gap: 6px 10px;
    align-items: center;
}

.param-jour {
    font-weight: bold;
    font-size: 13px;
    color: #4b5563;
    text-align: center;
}

.param-row-label {
    font-size: 14px;
    color: #6b7280;
    white-space: nowrap;
    padding-right: 4px;
}

.param-check {
    display: flex;
    justify-content: center;
    cursor: pointer;
}

.param-check input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #3b82f6;
}

/* Boutons de régénération dans les repas-box */
.repas-box .regen-btn {
    background: transparent;
    color: #9ca3af;
    border: none;
    padding: 0;
    margin: 0;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
}

.repas-box .regen-btn:hover {
    color: #3b82f6;
    background: #dbeafe;
}

.repas-box{
    background:#f9fafc;
    border-radius:6px;
    padding:8px;
    display:flex;
    flex-direction:column;
    border-left:3px solid #e5e7eb;
    position: relative;
}

.repas-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
}

.repas-titre{
    font-size:12px;
    color:#6b7280;
}

.repas-contenu{
    font-size:14px;
    font-weight:500;
}
</style>
</head>

<body>
<div class="app">
<h1>Planificateur de menus</h1>

<div class="parametres-bloc">
    <div class="parametres-titre">⚙️ Paramètres</div>
    <div class="parametres-grid">
        <!-- En-têtes jours -->
        <div></div>
        <div class="param-jour">Lundi</div>
        <div class="param-jour">Mardi</div>
        <div class="param-jour">Mercredi</div>
        <div class="param-jour">Jeudi</div>
        <div class="param-jour">Vendredi</div>
        <div class="param-jour">Samedi</div>
        <div class="param-jour">Dimanche</div>
        <!-- Ligne Midi -->
        <div class="param-row-label">☀️ Midi</div>
        <label class="param-check"><input type="checkbox" id="midi_lundi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mardi"></label>
        <label class="param-check"><input type="checkbox" id="midi_mercredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_jeudi"></label>
        <label class="param-check"><input type="checkbox" id="midi_vendredi"></label>
        <label class="param-check"><input type="checkbox" id="midi_samedi" checked></label>
        <label class="param-check"><input type="checkbox" id="midi_dimanche" checked></label>
    </div>
</div>

<div class="controls">
<button onclick="genererMenu()">Générer une semaine</button>
<button onclick="generer2Semaines()">Générer 2 semaines</button>
<button class="reset" onclick="resetHistorique()">Réinitialiser l'historique</button>
</div>

<div id="menu"></div>
</div>

<script>
let repas = []

async function chargerRepas(){
    const response = await fetch("repas.csv")
    const texte = await response.text()
    repas = texte
        .split("\n")
        .map(r => r.trim())
        .filter(r => r !== "")
        .map(r => ({name: r.split(";")[0].replace(/^"/, "").replace(/"$/, "")}))
}

const jours=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"]

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function midiActive(jour){return document.getElementById("midi_"+jour).checked;}

function calculerNbPlats(){
    let nbPlats = 7;
    jours.forEach(j=>{ if(midiActive(j.toLowerCase())) nbPlats++; });
    return nbPlats;
}

function piocherRepas(exclu, nbPlats){
    let liste = shuffle([...repas]).filter(r => !exclu.includes(r.name))
    if(liste.length < nbPlats) liste = shuffle([...repas])
    return liste.slice(0, nbPlats)
}

function sauvegarderMenu(menus){
    const dernier = menus[0].repas.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    localStorage.setItem("menu_precedent", JSON.stringify(dernier))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function afficher(menus){
    const container=document.getElementById("menu")
    container.innerHTML=""
    menus.forEach((semaine, indexSemaine) => {
        const bloc=document.createElement("div")
        bloc.className="semaine"
        const titre=document.createElement("h3")
        titre.textContent=semaine.titre
        const grid=document.createElement("div")
        grid.className="grid"

        semaine.repas.forEach((plat,i)=>{
            const ligne=document.createElement("div")
            ligne.className="jour"

            const j=document.createElement("span")
            j.className="nomjour"
            j.textContent=jours[i]

            ligne.appendChild(j)

            // === COLONNE 2 : MIDI ===
            if(midiActive(jours[i].toLowerCase())){
                const midiBox = document.createElement("div")
                midiBox.className = "repas-box"

                const midiHeader = document.createElement("div")
                midiHeader.className = "repas-header"

                const midiTitre = document.createElement("div")
                midiTitre.className = "repas-titre"
                midiTitre.textContent = "☀️ Midi"

                const midiBtnRegen = document.createElement("button")
                midiBtnRegen.className = "regen-btn"
                midiBtnRegen.textContent = "🔄"
                midiBtnRegen.title = "Régénérer le midi"
                midiBtnRegen.onclick = () => regenererRepas(i, "midi", menus, indexSemaine)

                midiHeader.appendChild(midiTitre)
                midiHeader.appendChild(midiBtnRegen)

                const midiContenu = document.createElement("div")
                midiContenu.className = "repas-contenu"
                midiContenu.textContent = plat.midi || "-"

                midiBox.appendChild(midiHeader)
                midiBox.appendChild(midiContenu)

                ligne.appendChild(midiBox)
            } else {
                const vide = document.createElement("div")
                ligne.appendChild(vide)
            }

            // === COLONNE 3 : SOIR ===
            const soirBox = document.createElement("div")
            soirBox.className = "repas-box"

            const soirHeader = document.createElement("div")
            soirHeader.className = "repas-header"

            const soirTitre = document.createElement("div")
            soirTitre.className = "repas-titre"
            soirTitre.textContent = "🌙 Soir"

            const soirBtnRegen = document.createElement("button")
            soirBtnRegen.className = "regen-btn"
            soirBtnRegen.textContent = "🔄"
            soirBtnRegen.title = "Régénérer le soir"
            soirBtnRegen.onclick = () => regenererRepas(i, "soir", menus, indexSemaine)

            soirHeader.appendChild(soirTitre)
            soirHeader.appendChild(soirBtnRegen)

            const soirContenu = document.createElement("div")
            soirContenu.className = "repas-contenu"
            soirContenu.textContent = plat.soir || "-"

            soirBox.appendChild(soirHeader)
            soirBox.appendChild(soirContenu)

            ligne.appendChild(soirBox)
            grid.appendChild(ligne)
        })

        bloc.appendChild(titre)
        bloc.appendChild(grid)
        container.appendChild(bloc)
    })
}

function genererMenu() {
    let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || [];
    let nbPlats = calculerNbPlats();
    const selection = piocherRepas(precedent, nbPlats);
   
    let index = 0;

    const menus = [{
        titre: "Semaine",
        repas: jours.map(jour => {
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){
                midi = selection[index]?.name || null; index++;
            }
            soir = selection[index]?.name || null; index++;
            return {midi, soir};
        })
    }];

    afficher(menus);
    sauvegarderMenu(menus)
}

function generer2Semaines(){
    let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || []
    const menus = []
    for(let s=1; s<=2; s++){
        let nbPlats = calculerNbPlats();
        const selection = piocherRepas(precedent, nbPlats)
        let index=0
        const semaine = jours.map(jour=>{
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){ midi=selection[index]?.name||null; index++; }
            soir=selection[index]?.name||null; index++;
            return {midi, soir}
        })
        menus.push({titre:"Semaine "+s, repas:semaine})
        precedent = semaine.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    }
    afficher(menus)
    localStorage.setItem("menu_precedent", JSON.stringify(precedent))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function resetHistorique(){
    localStorage.clear()
    document.getElementById("menu").innerHTML=""
}

// Nouvelle fonction : régénère uniquement midi OU soir pour un jour donné
function regenererRepas(indexJour, moment, menus, indexSemaine){
    let semaine = menus[indexSemaine].repas
    let exclu = menus.flatMap(s => s.repas).flatMap(r => [r.midi, r.soir]).filter(Boolean)
    let liste = piocherRepas(exclu, 1)
    if(liste.length > 0){
        semaine[indexJour][moment] = liste[0].name
    }
    afficher(menus)
    sauvegarderMenu(menus)
}

window.onload=async function(){
    await chargerRepas()
    const dernier = JSON.parse(localStorage.getItem("menu_derniere_generation"))
    if(dernier) afficher(dernier)
}
</script>
</body>
</html>
