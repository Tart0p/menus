<!DOCTYPE html>
<html>

<head>
<title>Planificateur de menus</title>
<style>
body{
    font-family:Arial, sans-serif;
    background:#eef2f7;
    margin:0;
    padding:40px;
    display:flex;
    justify-content:center;
}
.app{
    width:800px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h1{text-align:center;margin-top:0;}
.controls{text-align:center;margin-bottom:20px;}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 18px;
    margin:5px;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}
button:hover{background:#2563eb;}
.reset{background:#ef4444;}
.reset:hover{background:#dc2626;}
.semaine{
    margin-top:20px;
    background:#f9fafc;
    padding:15px;
    border-radius:10px;
}
.semaine h3{margin-top:0;}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
}
.jour{
    background:white;
    padding:10px;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    border:1px solid #eee;
}
.nomjour{font-weight:bold;color:#555;}
.plat{color:#111;}
.midicheck{
    display:flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom:15px;
}
.midicheck label{
    display:flex;
    align-items:center;
    gap:4px;
    font-size:14px;
}
.jour hr{
    border: 0;
    border-top: 1px solid #ccc;
    margin: 4px 0;
}

.jour button {
    background: #f3f4f6; /* gris clair discret */
    color: #3b82f6;      /* bleu pour rester visible */
    border: none;
    padding: 2px 6px;
    font-size: 14px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 8px;
    transition: background 0.2s;
}

.jour button:hover {
    background: #dbeafe; /* léger survol bleu clair */
}

</style>
</head>

<body>
<div class="app">
<h1>Planificateur de menus</h1>

<h3>Repas du midi</h3>
<div class="midicheck">
<label><input type="checkbox" id="midi_lundi"> Lundi</label>
<label><input type="checkbox" id="midi_mardi"> Mardi</label>
<label><input type="checkbox" id="midi_mercredi"> Mercredi</label>
<label><input type="checkbox" id="midi_jeudi"> Jeudi</label>
<label><input type="checkbox" id="midi_vendredi"> Vendredi</label>
<label><input type="checkbox" id="midi_samedi" checked> Samedi</label>
<label><input type="checkbox" id="midi_dimanche" checked> Dimanche</label>
</div>

<div class="controls">
<button onclick="genererMenu()">Générer une semaine</button>
<button onclick="generer4Semaines()">Générer 4 semaines</button>
<button class="reset" onclick="resetHistorique()">Réinitialiser l'historique</button>
</div>

<div id="menu"></div>
</div>

<script>
const repas=[
{name:"Lasagnes"},{name:"Poulet curry"},{name:"Burger"},{name:"Chili con carne"},
{name:"Tacos"},{name:"Omelette"},{name:"Risotto champignons"},{name:"Curry légumes"},
{name:"Salade grecque"},{name:"Pizza margherita"},{name:"Riz sauté légumes"},{name:"Pâtes pesto"},
{name:"Soupe légumes"},{name:"Quiche légumes"},{name:"Gratin pommes de terre"},{name:"Falafel"},
{name:"Couscous légumes"},{name:"Pad thai végétarien"},{name:"Salade quinoa"},{name:"Tarte tomate"}
]

const jours=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"]

function shuffle(a){return a.sort(()=>Math.random()-0.5);}
function filtrer(){return [...repas];}
function midiActive(jour){return document.getElementById("midi_"+jour).checked;}

function afficher(menus){
    const container=document.getElementById("menu")
    container.innerHTML=""
    menus.forEach(semaine=>{
        const bloc=document.createElement("div")
        bloc.className="semaine"
        const titre=document.createElement("h3")
        titre.textContent=semaine.titre
        const grid=document.createElement("div")
        grid.className="grid"

        semaine.repas.forEach((plat,i)=>{
            const ligne=document.createElement("div")
            ligne.className="jour"

            const j=document.createElement("span")
            j.className="nomjour"
            j.textContent=jours[i]

            const p=document.createElement("span")
            p.className="plat"

            const btn = document.createElement("button")
            btn.textContent = "🔄"
            btn.style.marginLeft = "6px"
            btn.style.fontSize = "14px"
            btn.onclick = ()=>regenererJour(i, menus)

            if(midiActive(jours[i].toLowerCase())){
                p.innerHTML = "Midi : "+plat.midi+"<hr>Soir : "+plat.soir
            } else {
                p.innerHTML = "Soir : "+plat.soir
            }

			j.appendChild(btn)  // le bouton est à côté du nom du jour
			ligne.appendChild(j)
			ligne.appendChild(p)
            grid.appendChild(ligne)
        })

        bloc.appendChild(titre)
        bloc.appendChild(grid)
        container.appendChild(bloc)
    })
}

function genererMenu() {
    let liste = shuffle(filtrer());
    let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || [];
    liste = liste.filter(r => !precedent.includes(r.name));
    let nbPlats = 7;
    jours.forEach(j=>{ if(midiActive(j.toLowerCase())) nbPlats++; });
    if(liste.length < nbPlats){ liste = shuffle(filtrer()); }

    const selection = liste.slice(0, nbPlats);
    let index = 0;

    const menus = [{
        titre: "Semaine",
        repas: jours.map(jour => {
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){
                midi = selection[index]?.name || null; index++;
            }
            soir = selection[index]?.name || null; index++;
            return {midi, soir};
        })
    }];

    afficher(menus);

    const dernier = menus[0].repas.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    localStorage.setItem("menu_precedent", JSON.stringify(dernier))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function generer4Semaines(){
    let liste = filtrer()
    let precedent = JSON.parse(localStorage.getItem("menu_precedent")) || []
    const menus = []
    for(let s=1; s<=4; s++){
        let candidats = shuffle(liste).filter(r => !precedent.includes(r.name))
        let nbPlats = 7; jours.forEach(j=>{ if(midiActive(j.toLowerCase())) nbPlats++ })
        if(candidats.length < nbPlats){ candidats = shuffle(liste) }
        const selection = candidats.slice(0, nbPlats)
        let index=0
        const semaine = jours.map(jour=>{
            let midi=null, soir=null;
            if(midiActive(jour.toLowerCase())){ midi=selection[index]?.name||null; index++; }
            soir=selection[index]?.name||null; index++;
            return {midi, soir}
        })
        menus.push({titre:"Semaine "+s, repas:semaine})
        precedent = semaine.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    }
    afficher(menus)
    localStorage.setItem("menu_precedent", JSON.stringify(precedent))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

function resetHistorique(){
    localStorage.clear()
    document.getElementById("menu").innerHTML=""
}

function regenererJour(indexJour, menus){
    const jourID = jours[indexJour].toLowerCase()
    let semaine = menus[0].repas
    let exclu = menus.flatMap(s=>s.repas).flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    let liste = shuffle(filtrer()).filter(r=>!exclu.includes(r.name))
    if(liste.length===0) liste = shuffle(filtrer())
    let index=0
    if(midiActive(jourID)){
        semaine[indexJour].midi = liste[index]?.name || semaine[indexJour].midi; index++
    }
    semaine[indexJour].soir = liste[index]?.name || semaine[indexJour].soir; index++
    afficher(menus)
    const dernier = menus[0].repas.flatMap(r=>[r.midi,r.soir]).filter(Boolean)
    localStorage.setItem("menu_precedent", JSON.stringify(dernier))
    localStorage.setItem("menu_derniere_generation", JSON.stringify(menus))
}

window.onload=function(){
    const dernier = JSON.parse(localStorage.getItem("menu_derniere_generation"))
    if(dernier) afficher(dernier)
}
</script>
</body>
</html>
